<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} - DevStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">
    <div>
        <nav class="bg-indigo-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <a href="{% url 'product_list' %}" class="text-2xl font-bold">DevStore</a>
                <a href="{% url 'cart_detail' %}" class="bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-lg font-medium transition">🛒 Panier</a>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-10 max-w-4xl">
            <a href="{% url 'product_list' %}" class="text-indigo-600 hover:underline mb-6 inline-block">&larr; Retour à la boutique</a>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-8 p-6">
                <div>
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-80 object-cover rounded-lg">
                    {% else %}
                        <div class="w-full h-80 bg-gray-200 rounded-lg flex items-center justify-center text-gray-400">Pas d'image</div>
                    {% endif %}
                </div>

                <div class="flex flex-col justify-between">
                    <div>
                        <span class="text-xs font-semibold text-indigo-600 uppercase">{{ product.category.name }}</span>
                        <h1 class="text-3xl font-bold text-gray-900 mt-2">{{ product.name }}</h1>
                        <p class="text-2xl font-bold text-indigo-600 mt-4">{{ product.price }} €</p>
                        <p class="text-gray-600 mt-4">{{ product.description }}</p>
                    </div>

                    <form action="{% url 'cart_add' product.id %}" method="post" class="mt-6 flex items-center gap-4">
                        {% csrf_token %}
                        <label for="quantity" class="text-sm font-medium text-gray-700">Quantité :</label>
                        <input type="number" name="quantity" id="quantity" value="1" min="1" class="w-16 border border-gray-300 rounded-lg px-3 py-2 text-center">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-medium transition w-full">
                            Ajouter au panier
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm">
        DevStore Portfolio &copy; 2026
    </footer>
</body>
</html>
